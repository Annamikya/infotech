<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="service2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f0fdf4" stroke="url(#service2Grad)" stroke-width="2"/>
  
  <!-- Icon: Shield with gear -->
  <g transform="translate(100, 100)">
    <!-- Shield -->
    <path d="M 0 -40 L 30 -20 L 30 10 Q 30 40 0 50 Q -30 40 -30 10 L -30 -20 Z" fill="url(#service2Grad)" stroke="url(#service2Grad)" stroke-width="1.5"/>
    
    <!-- Gear inside -->
    <circle cx="0" cy="5" r="12" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="5" r="4" fill="white"/>
    
    <!-- Gear teeth -->
    <rect x="-2" y="-18" width="4" height="6" fill="white"/>
    <rect x="-2" y="22" width="4" height="6" fill="white"/>
    <rect x="-18" y="3" width="6" height="4" fill="white"/>
    <rect x="22" y="3" width="6" height="4" fill="white"/>
  </g>
</svg>
