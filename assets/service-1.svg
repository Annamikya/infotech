<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="service1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f0f4ff" stroke="url(#service1Grad)" stroke-width="2"/>
  
  <!-- Icon: Clipboard with checkmarks -->
  <g transform="translate(100, 100)">
    <!-- Clipboard -->
    <rect x="-30" y="-45" width="60" height="80" rx="4" fill="url(#service1Grad)"/>
    <rect x="-28" y="-40" width="56" height="8" fill="#6366f1" opacity="0.3"/>
    
    <!-- Checkmarks -->
    <g transform="translate(-15, -20)">
      <path d="M 0 0 L 5 5 L 12 -5" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(-15, 5)">
      <path d="M 0 0 L 5 5 L 12 -5" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(-15, 30)">
      <path d="M 0 0 L 5 5 L 12 -5" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
