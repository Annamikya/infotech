<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="feat1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#eff6ff" stroke="url(#feat1Grad)" stroke-width="2"/>
  
  <!-- Icon: Speedometer/Performance -->
  <g transform="translate(100, 100)">
    <!-- Gauge base -->
    <circle cx="0" cy="10" r="30" fill="none" stroke="url(#feat1Grad)" stroke-width="3"/>
    
    <!-- Needle -->
    <line x1="0" y1="10" x2="20" y2="-15" stroke="url(#feat1Grad)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="10" r="4" fill="url(#feat1Grad)"/>
    
    <!-- Speed marks -->
    <line x1="-28" y1="10" x2="-30" y2="10" stroke="url(#feat1Grad)" stroke-width="2"/>
    <line x1="25" y1="-15" x2="27" y2="-17" stroke="url(#feat1Grad)" stroke-width="2"/>
    <line x1="28" y1="8" x2="30" y2="8" stroke="url(#feat1Grad)" stroke-width="2"/>
  </g>
</svg>
