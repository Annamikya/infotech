<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="40" height="40">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="48" fill="url(#logoGradient)" opacity="0.1"/>
  
  <!-- Shield shape -->
  <path d="M 50 20 L 70 30 L 70 50 Q 70 75 50 85 Q 30 75 30 50 L 30 30 Z" fill="url(#logoGradient)" stroke="#8B5CF6" stroke-width="2"/>
  
  <!-- Checkmark inside shield -->
  <g transform="translate(50, 50)">
    <path d="M -8 0 L 0 8 L 12 -8" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
